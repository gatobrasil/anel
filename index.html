<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel do Anel BLE</title>

<style>
body{
font-family:Arial;
background:#0b0f14;
color:white;
padding:20px;
}

button{
padding:10px 15px;
margin:5px;
cursor:pointer;
border:none;
border-radius:6px;
background:#00aaff;
color:white;
}

input{
padding:10px;
width:300px;
}

.card{
background:#121821;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

#log{
background:black;
color:#00ff88;
padding:10px;
height:260px;
overflow:auto;
border-radius:8px;
font-family:monospace;
}
</style>
</head>

<body>

<h2>Painel Bluetooth do Anel</h2>

<div class="card">
<button id="connect">Conectar</button>
<button id="disconnect">Desconectar</button>
</div>

<div class="card">
Bateria: <span id="battery">--</span> %
</div>

<div class="card">
<input id="cmd" placeholder="comando ex: MEAS_START ou AA 55 0F 01">
<button id="send">Enviar</button>
</div>

<div class="card">
<div id="log"></div>
</div>

<script>

const SERVICE_UART = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
const RX = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";
const TX = "6e400003-b5a3-f393-e0a9-e50e24dcca9e";

let device;
let server;
let rxChar;
let txChar;

function log(t){
let logDiv=document.getElementById("log");
logDiv.innerHTML+=t+"<br>";
logDiv.scrollTop=logDiv.scrollHeight;
}

function hex(buffer){
return [...new Uint8Array(buffer)]
.map(x=>x.toString(16).padStart(2,"0"))
.join(" ");
}

document.getElementById("connect").onclick=async()=>{

device = await navigator.bluetooth.requestDevice({
acceptAllDevices:true,
optionalServices:[
SERVICE_UART,
"battery_service",
"device_information",
"heart_rate",
"fee7",
"fea0",
"fea1",
"fea2",
"ae00"
]
});

log("Dispositivo: "+device.name);

server=await device.gatt.connect();

log("Conectado");

try{

let battService=await server.getPrimaryService("battery_service");
let battChar=await battService.getCharacteristic("battery_level");
let batt=await battChar.readValue();

document.getElementById("battery").innerText=batt.getUint8(0);

}catch(e){}

try{

let uartService=await server.getPrimaryService(SERVICE_UART);

rxChar=await uartService.getCharacteristic(RX);
txChar=await uartService.getCharacteristic(TX);

await txChar.startNotifications();

txChar.addEventListener("characteristicvaluechanged",event=>{

let data=event.target.value.buffer;

let txt=new TextDecoder().decode(data);

log("RX texto: "+txt);

log("RX hex: "+hex(data));

});

log("UART conectado");

}catch(e){

log("UART não encontrado");

}

};

document.getElementById("disconnect").onclick=()=>{
if(device && device.gatt.connected){
device.gatt.disconnect();
log("Desconectado");
}
};

document.getElementById("send").onclick=async()=>{

let cmd=document.getElementById("cmd").value;

if(!rxChar) return;

if(cmd.includes(" ")){

let bytes=cmd.split(" ").map(x=>parseInt(x,16));

await rxChar.writeValue(new Uint8Array(bytes));

log("TX HEX: "+cmd);

}else{

let enc=new TextEncoder();

await rxChar.writeValue(enc.encode(cmd));

log("TX TEXT: "+cmd);

}

};

</script>

</body>
</html>
