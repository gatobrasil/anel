<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Scanner BLE (Anel)</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 18px; }
    button { padding: 10px 14px; font-size: 16px; cursor: pointer; }
    pre { background:#0b0b0b; color:#7CFC00; padding:12px; border-radius:10px; overflow:auto; min-height: 240px; }
    .row { display:flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
  </style>
</head>
<body>
  <h1>Scanner BLE (Listar Serviços)</h1>

  <div class="row">
    <button id="btnConnect">Conectar e listar</button>
    <button id="btnDisconnect" disabled>Desconectar</button>
  </div>

  <pre id="log"></pre>

<script>
const logEl = document.getElementById('log');
const btnConnect = document.getElementById('btnConnect');
const btnDisconnect = document.getElementById('btnDisconnect');

let device = null;
let server = null;

function log(msg) {
  logEl.textContent += msg + "\n";
  logEl.scrollTop = logEl.scrollHeight;
}

function hex(u8) {
  return [...u8].map(b=>b.toString(16).padStart(2,'0')).join(' ');
}

function isWebBluetoothSupported() {
  return !!navigator.bluetooth;
}

async function connectAndList() {
  if (!isWebBluetoothSupported()) {
    log("❌ Seu navegador não suporta Web Bluetooth. Use Chrome no PC.");
    return;
  }

  log("Abrindo seletor BLE...");
  // IMPORTANTÍSSIMO: sem filters, para não “sumir” o anel
  device = await navigator.bluetooth.requestDevice({
    acceptAllDevices: true,
    optionalServices: [
      'device_information',
      'battery_service',
      'heart_rate',

      // Nordic UART (muito comum)
      '6e400001-b5a3-f393-e0a9-e50e24dcca9e',

      // Seus “unknowns” que você viu no app
      'fee7',
      'fea0',
      'fea1',
      'fea2',
      'ae00',

      // Esse que você viu: BE94....
      'be940000-7333-be46-b7ae-689e71722bd5'
    ]
  });

  log(`Dispositivo escolhido: ${device.name || '(sem nome)'} | id: ${device.id}`);

  device.addEventListener('gattserverdisconnected', () => {
    log("⚠️ Desconectado.");
    btnDisconnect.disabled = true;
  });

  log("Conectando GATT...");
  server = await device.gatt.connect();
  log("✅ GATT conectado.");

  btnDisconnect.disabled = false;

  // Lista serviços e characteristics
  log("Listando serviços...");
  const services = await server.getPrimaryServices();
  log(`Serviços primários encontrados: ${services.length}`);

  for (const s of services) {
    log(`\n[SERVICE] ${s.uuid}`);
    const chars = await s.getCharacteristics();
    for (const c of chars) {
      const props = Object.entries(c.properties).filter(([k,v])=>v).map(([k])=>k).join(', ');
      log(`  [CHAR] ${c.uuid} | props: ${props}`);

      // Tenta ler se der
      if (c.properties.read) {
        try {
          const v = await c.readValue();
          const u8 = new Uint8Array(v.buffer);
          log(`    read: ${hex(u8)}  (len=${u8.length})`);
        } catch (e) {
          log(`    read: erro (${e.message})`);
        }
      }

      // Assina notify se der
      if (c.properties.notify || c.properties.indicate) {
        try {
          await c.startNotifications();
          c.addEventListener('characteristicvaluechanged', (ev) => {
            const dv = ev.target.value;
            const u8 = new Uint8Array(dv.buffer);

            // Se for Heart Rate Measurement (0x2A37) tenta decodificar
            if (c.uuid.endsWith('2a37')) {
              const flags = u8[0];
              const hr16 = (flags & 0x01) !== 0;
              const hr = hr16 ? (u8[1] | (u8[2] << 8)) : u8[1];
              log(`❤️ HR notify: ${hr} bpm | raw: ${hex(u8)}`);
            } else {
              // Geral: tenta texto + raw
              const text = new TextDecoder().decode(u8);
              log(`🔔 notify ${c.uuid}: "${text}" | raw: ${hex(u8)}`);
            }
          });
          log(`    notify: ON`);
        } catch (e) {
          log(`    notify: erro (${e.message})`);
        }
      }
    }
  }

  // Tenta usar Nordic UART especificamente (se existir)
  try {
    const uart = await server.getPrimaryService('6e400001-b5a3-f393-e0a9-e50e24dcca9e');
    const rx = await uart.getCharacteristic('6e400002-b5a3-f393-e0a9-e50e24dcca9e'); // write
    const tx = await uart.getCharacteristic('6e400003-b5a3-f393-e0a9-e50e24dcca9e'); // notify
    await tx.startNotifications();
    tx.addEventListener('characteristicvaluechanged', (ev) => {
      const u8 = new Uint8Array(ev.target.value.buffer);
      const text = new TextDecoder().decode(u8);
      log(`📨 UART TX: "${text}" | raw: ${hex(u8)}`);
    });
    log("\n✅ Nordic UART detectado. Enviando 'MEAS_START'...");
    await rx.writeValue(new TextEncoder().encode("MEAS_START"));
  } catch (e) {
    log(`\nℹ️ Nordic UART não encontrado/sem permissão: ${e.message}`);
  }
}

async function disconnect() {
  if (device?.gatt?.connected) {
    device.gatt.disconnect();
  }
  btnDisconnect.disabled = true;
  log("Desconectado manualmente.");
}

btnConnect.addEventListener('click', () => {
  logEl.textContent = "";
  connectAndList().catch(err => log("ERRO: " + err.message));
});
btnDisconnect.addEventListener('click', () => disconnect());
</script>
</body>
</html>
