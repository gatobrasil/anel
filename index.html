<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teste mínimo do anel</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f4f7fb; }
    button { padding: 12px 16px; margin: 6px 6px 0 0; border: none; border-radius: 10px; cursor: pointer; }
    .blue { background: #2563eb; color: white; }
    .green { background: #059669; color: white; }
    .red { background: #dc2626; color: white; }
    pre { background: #111827; color: #10b981; padding: 14px; border-radius: 12px; min-height: 220px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h2>Teste mínimo do anel</h2>
  <button class="blue" id="connectBtn">Conectar</button>
  <button class="green" id="cmd1Btn">Enviar 01</button>
  <button class="green" id="cmd2Btn">Enviar 01 01</button>
  <button class="red" id="disconnectBtn">Desconectar</button>

  <p><strong>Status:</strong> <span id="status">Desconectado</span></p>
  <pre id="log"></pre>

  <script>
    let device = null;
    let server = null;
    let beWrite = null;
    let beNotify = null;
    let hrChar = null;

    const statusEl = document.getElementById("status");
    const logEl = document.getElementById("log");

    function log(msg) {
      const line = `[${new Date().toLocaleTimeString()}] ${msg}`;
      logEl.textContent += line + "\n";
      logEl.scrollTop = logEl.scrollHeight;
      console.log(line);
    }

    function setStatus(msg) {
      statusEl.textContent = msg;
    }

    function hexToBytes(hex) {
      const clean = hex.replace(/[^0-9a-fA-F]/g, "");
      if (!clean || clean.length % 2 !== 0) throw new Error("HEX inválido");
      const arr = [];
      for (let i = 0; i < clean.length; i += 2) {
        arr.push(parseInt(clean.slice(i, i + 2), 16));
      }
      return new Uint8Array(arr);
    }

    function bytesToHex(buffer) {
      return [...new Uint8Array(buffer)].map(b => b.toString(16).padStart(2, "0")).join(" ");
    }

    function parseHeartRate(dataView) {
      const flags = dataView.getUint8(0);
      const is16Bit = flags & 0x01;
      return is16Bit ? dataView.getUint16(1, true) : dataView.getUint8(1);
    }

    async function connectRing() {
      try {
        logEl.textContent = "";
        device = await navigator.bluetooth.requestDevice({
          acceptAllDevices: true,
          optionalServices: [
            "heart_rate",
            "be940000-7333-be46-b7ae-689e71722bd5"
          ]
        });

        device.addEventListener("gattserverdisconnected", () => {
          setStatus("Desconectado");
          log("Dispositivo desconectado");
        });

        setStatus("Conectando...");
        server = await device.gatt.connect();

        const hrService = await server.getPrimaryService("heart_rate");
        hrChar = await hrService.getCharacteristic("heart_rate_measurement");
        await hrChar.startNotifications();
        hrChar.addEventListener("characteristicvaluechanged", (event) => {
          const hex = bytesToHex(event.target.value.buffer);
          const hr = parseHeartRate(event.target.value);
          log(`2A37 -> HEX ${hex} -> FC ${hr} bpm`);
        });

        const beService = await server.getPrimaryService("be940000-7333-be46-b7ae-689e71722bd5");
        beWrite = await beService.getCharacteristic("be940001-7333-be46-b7ae-689e71722bd5");
        beNotify = await beService.getCharacteristic("be940003-7333-be46-b7ae-689e71722bd5");

        await beNotify.startNotifications();
        beNotify.addEventListener("characteristicvaluechanged", (event) => {
          const hex = bytesToHex(event.target.value.buffer);
          log(`BE940003 -> ${hex}`);
        });

        setStatus("Conectado");
        log("Conectado e pronto");
        log("Espere 3 segundos antes de enviar o comando");
      } catch (e) {
        setStatus("Erro");
        log("Erro: " + e.message);
      }
    }

    async function sendCommand(hex) {
      try {
        if (!beWrite) {
          log("Conecte primeiro");
          return;
        }

        const bytes = hexToBytes(hex);
        if (beWrite.properties.writeWithoutResponse) {
          await beWrite.writeValueWithoutResponse(bytes);
        } else {
          await beWrite.writeValueWithResponse(bytes);
        }
        log(`Comando enviado em BE940001: ${hex}`);
      } catch (e) {
        log("Erro ao enviar: " + e.message);
      }
    }

    function disconnectRing() {
      if (device && device.gatt && device.gatt.connected) {
        device.gatt.disconnect();
      }
      setStatus("Desconectado");
    }

    document.getElementById("connectBtn").addEventListener("click", connectRing);
    document.getElementById("cmd1Btn").addEventListener("click", () => sendCommand("01"));
    document.getElementById("cmd2Btn").addEventListener("click", () => sendCommand("01 01"));
    document.getElementById("disconnectBtn").addEventListener("click", disconnectRing);
  </script>
</body>
</html>
