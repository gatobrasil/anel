<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scanner BLE Completo</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background:#f5f7fb; }
    button { padding:12px 16px; font-size:16px; border:none; border-radius:10px; cursor:pointer; }
    pre { background:#111; color:#0f0; padding:15px; border-radius:12px; white-space:pre-wrap; }
  </style>
</head>
<body>
  <h1>Scanner BLE Completo</h1>
  <button id="connectBtn">Conectar e listar tudo</button>
  <pre id="log"></pre>

  <script>
    const logEl = document.getElementById("log");

    function log(msg) {
      logEl.textContent += msg + "\n";
      console.log(msg);
    }

    async function connectAndList() {
      try {
        logEl.textContent = "";

        const device = await navigator.bluetooth.requestDevice({
          acceptAllDevices: true,
          optionalServices: [
            0x1800, 0x1801, 0x180A, 0x180D, 0x180F, 0x181A
          ]
        });

        log("Dispositivo: " + (device.name || "Sem nome"));

        const server = await device.gatt.connect();
        log("Conectado.");

        const services = await server.getPrimaryServices();
        log("Total de serviços: " + services.length);
        log("");

        for (const service of services) {
          log("SERVICE: " + service.uuid);

          const characteristics = await service.getCharacteristics();
          for (const ch of characteristics) {
            log("  CHARACTERISTIC: " + ch.uuid);
            log("    read=" + ch.properties.read);
            log("    write=" + ch.properties.write);
            log("    writeWithoutResponse=" + ch.properties.writeWithoutResponse);
            log("    notify=" + ch.properties.notify);
            log("    indicate=" + ch.properties.indicate);

            if (ch.properties.read) {
              try {
                const value = await ch.readValue();
                const bytes = [...new Uint8Array(value.buffer)]
                  .map(b => b.toString(16).padStart(2, "0"))
                  .join(" ");
                log("    valor(hex): " + bytes);
              } catch (e) {
                log("    erro ao ler: " + e.message);
              }
            }

            log("");
          }
        }
      } catch (err) {
        log("ERRO: " + err.message);
      }
    }

    document.getElementById("connectBtn").addEventListener("click", connectAndList);
  </script>
</body>
</html>
