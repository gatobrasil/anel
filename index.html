<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Ring Medical Monitor</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f4f7fb; padding:20px; color:#1f2937; }
    .wrap { max-width:900px; margin:auto; }
    .card { background:#fff; padding:18px; border-radius:16px; margin-top:16px; box-shadow:0 4px 18px rgba(0,0,0,.08); }
    button { padding:12px 16px; margin:6px 6px 0 0; border:none; border-radius:10px; cursor:pointer; }
    .blue { background:#2563eb; color:#fff; }
    .green { background:#059669; color:#fff; }
    .red { background:#dc2626; color:#fff; }
    .gray { background:#6b7280; color:#fff; }
    .value { font-size:48px; font-weight:bold; }
    pre { background:#111827; color:#10b981; padding:14px; border-radius:12px; min-height:180px; white-space:pre-wrap; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h2>Smart Ring Medical Monitor</h2>
    <button class="blue" id="connectBtn">Conectar</button>
    <button class="green" id="hrBtn">Medir FC</button>
    <button class="red" id="stopBtn">Parar</button>
    <button class="gray" id="spo2Btn">Medir SpO₂</button>
    <p><strong>Status:</strong> <span id="status">Desconectado</span></p>
    <p><strong>Dispositivo:</strong> <span id="deviceName">---</span></p>
  </div>

  <div class="card">
    <div><strong>Frequência cardíaca</strong></div>
    <div class="value"><span id="heartRate">--</span> bpm</div>
  </div>

  <div class="card">
    <div><strong>Log BLE</strong></div>
    <pre id="log"></pre>
  </div>
</div>

<script>
let device, server;
let hrChar, beWrite, beNotify;

const statusEl = document.getElementById("status");
const deviceNameEl = document.getElementById("deviceName");
const heartRateEl = document.getElementById("heartRate");
const logEl = document.getElementById("log");

function log(msg) {
  const line = `[${new Date().toLocaleTimeString()}] ${msg}`;
  logEl.textContent += line + "\n";
  logEl.scrollTop = logEl.scrollHeight;
}

function setStatus(s) {
  statusEl.textContent = s;
}

function parseHeartRate(dataView) {
  const flags = dataView.getUint8(0);
  const is16Bit = flags & 0x01;
  return is16Bit ? dataView.getUint16(1, true) : dataView.getUint8(1);
}

function handleHeartRate(event) {
  const hr = parseHeartRate(event.target.value);
  heartRateEl.textContent = hr;
  log(`FC = ${hr} bpm`);
}

function hexToBytes(hex) {
  const clean = hex.replace(/[^0-9a-fA-F]/g, "");
  if (!clean || clean.length % 2 !== 0) throw new Error("HEX inválido");
  const bytes = [];
  for (let i = 0; i < clean.length; i += 2) {
    bytes.push(parseInt(clean.slice(i, i + 2), 16));
  }
  return new Uint8Array(bytes);
}

async function sendBE(hex) {
  const bytes = hexToBytes(hex);
  if (beWrite.properties.writeWithoutResponse) {
    await beWrite.writeValueWithoutResponse(bytes);
  } else {
    await beWrite.writeValueWithResponse(bytes);
  }
  log(`Comando enviado em be940001: ${hex}`);
}

async function connectRing() {
  device = await navigator.bluetooth.requestDevice({
    acceptAllDevices: true,
    optionalServices: [
      "heart_rate",
      "be940000-7333-be46-b7ae-689e71722bd5"
    ]
  });

  deviceNameEl.textContent = device.name || "Sem nome";
  device.addEventListener("gattserverdisconnected", () => {
    setStatus("Desconectado");
    log("Dispositivo desconectado");
  });

  setStatus("Conectando...");
  server = await device.gatt.connect();

  const hrService = await server.getPrimaryService("heart_rate");
  hrChar = await hrService.getCharacteristic("heart_rate_measurement");
  await hrChar.startNotifications();
  hrChar.addEventListener("characteristicvaluechanged", handleHeartRate);

  const beService = await server.getPrimaryService("be940000-7333-be46-b7ae-689e71722bd5");
  beWrite = await beService.getCharacteristic("be940001-7333-be46-b7ae-689e71722bd5");
  beNotify = await beService.getCharacteristic("be940003-7333-be46-b7ae-689e71722bd5");

  try {
    await beNotify.startNotifications();
    beNotify.addEventListener("characteristicvaluechanged", (e) => {
      const bytes = [...new Uint8Array(e.target.value.buffer)].map(b => b.toString(16).padStart(2, "0")).join(" ");
      log(`be940003 -> ${bytes}`);
    });
  } catch {}

  setStatus("Conectado");
  log("Conectado com sucesso");
}

document.getElementById("connectBtn").addEventListener("click", connectRing);

// TROQUE ESTES HEX PELOS CONFIRMADOS NOS SEUS TESTES
document.getElementById("hrBtn").addEventListener("click", () => sendBE("01"));
document.getElementById("stopBtn").addEventListener("click", () => sendBE("00"));
document.getElementById("spo2Btn").addEventListener("click", () => sendBE("02"));
</script>
</body>
</html>
