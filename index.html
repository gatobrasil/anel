<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Teste Web Bluetooth</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 18px; }
    button { padding: 10px 14px; font-size: 16px; cursor: pointer; margin-right: 8px; }
    pre { background:#0b0b0b; color:#7CFC00; padding:12px; border-radius:10px; overflow:auto; min-height: 260px; }
    .warn { color: #b00020; font-weight: bold; }
    .ok { color: #0a7a00; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Teste Web Bluetooth (Chrome)</h1>

  <div id="status"></div>
  <br>

  <button id="btnTest">Testar suporte</button>
  <button id="btnScan">Procurar BLE (acceptAllDevices)</button>

  <pre id="log"></pre>

<script>
const logEl = document.getElementById('log');
const statusEl = document.getElementById('status');
const btnTest = document.getElementById('btnTest');
const btnScan = document.getElementById('btnScan');

function log(msg) {
  logEl.textContent += msg + "\n";
  logEl.scrollTop = logEl.scrollHeight;
}

function setStatus(html) {
  statusEl.innerHTML = html;
}

function checkEnv() {
  const isSecure = window.isSecureContext;
  const proto = location.protocol;
  const host = location.hostname;

  let msgs = [];
  msgs.push(`SecureContext: ${isSecure} | protocol: ${proto} | host: ${host}`);

  if (!isSecure) {
    msgs.push(`<div class="warn">⚠️ Precisa estar em HTTPS ou localhost. GitHub Pages é OK.</div>`);
  } else {
    msgs.push(`<div class="ok">✅ Ambiente seguro (HTTPS/localhost)</div>`);
  }

  if (!navigator.bluetooth) {
    msgs.push(`<div class="warn">❌ navigator.bluetooth NÃO existe → Web Bluetooth indisponível neste navegador/PC.</div>`);
  } else {
    msgs.push(`<div class="ok">✅ navigator.bluetooth OK</div>`);
  }

  setStatus(msgs.join("<br>"));
}

async function testSupport() {
  logEl.textContent = "";
  checkEnv();

  if (!navigator.bluetooth) {
    log("❌ Web Bluetooth não disponível. Use Chrome/Edge no PC com Bluetooth BLE.");
    return;
  }

  try {
    const avail = await navigator.bluetooth.getAvailability();
    log("getAvailability(): " + avail);
    if (!avail) {
      log("⚠️ Bluetooth parece indisponível (desligado/sem adaptador/driver).");
    } else {
      log("✅ Bluetooth disponível.");
    }
  } catch (e) {
    log("Erro no getAvailability(): " + e.message);
  }

  log("\nDica: se o seletor aparecer vazio, quase sempre é driver/Windows Location/permissões.");
}

async function scanAny() {
  log("\nAbrindo seletor BLE...");
  try {
    const device = await navigator.bluetooth.requestDevice({
      acceptAllDevices: true,
      optionalServices: ['device_information','battery_service','heart_rate']
    });
    log(`✅ Selecionado: ${device.name || '(sem nome)'} | id: ${device.id}`);
    log("Agora você pode tentar conectar no seu código completo depois.");
  } catch (e) {
    log("ERRO requestDevice(): " + e.name + " | " + e.message);
    if (e.name === "NotFoundError") {
      log("➡️ NotFoundError pode ser: você cancelou, OU o Chrome não conseguiu ver nenhum BLE.");
    }
  }
}

btnTest.addEventListener('click', testSupport);
btnScan.addEventListener('click', scanAny);

checkEnv();
</script>
</body>
</html>
