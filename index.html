<script>
async function connectAndProbe() {
  try {
    const device = await navigator.bluetooth.requestDevice({
      acceptAllDevices: true,
      optionalServices: [
        'heart_rate',
        'generic_access',
        'generic_attribute',
        'battery_service',
        'device_information',
        '0000ae00-0000-1000-8000-00805f9b34fb',
        'be940000-7333-be46-b7ae-689e71722bd5',
        '6e400001-b5a3-f393-e0a9-e50e24dcca9e',
        '0000fe59-0000-1000-8000-00805f9b34fb'
      ]
    });

    console.log("Dispositivo:", device.name);

    const server = await device.gatt.connect();
    const services = await server.getPrimaryServices();

    console.log("SERVIÇOS ENCONTRADOS:");
    for (const service of services) {
      console.log("SERVICE:", service.uuid);

      const characteristics = await service.getCharacteristics();
      for (const ch of characteristics) {
        console.log("  CHARACTERISTIC:", ch.uuid);
        console.log("    read=", ch.properties.read);
        console.log("    write=", ch.properties.write);
        console.log("    writeWithoutResponse=", ch.properties.writeWithoutResponse);
        console.log("    notify=", ch.properties.notify);
        console.log("    indicate=", ch.properties.indicate);
      }
    }
  } catch (e) {
    console.error(e);
  }
}
</script>
