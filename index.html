<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Anel BLE — Captura Total</title>
  <style>
    body{font-family:Arial,system-ui;margin:18px;background:#0b0f14;color:#e8f0ff}
    .row{display:flex;gap:10px;flex-wrap:wrap;margin:10px 0}
    .card{background:#121821;border:1px solid #1b2a3a;padding:12px;border-radius:12px;margin-bottom:12px}
    button{padding:10px 14px;border:0;border-radius:8px;background:#00aaff;color:#001018;font-weight:700;cursor:pointer}
    button:disabled{opacity:.45;cursor:not-allowed}
    input,select{padding:10px;border-radius:8px;border:1px solid #223;background:#0f172a;color:#e8f0ff}
    input{width:min(520px,100%)}
    #log{white-space:pre-wrap;background:#05070a;border:1px solid #113;color:#7CFC8A;
         padding:12px;border-radius:12px;min-height:260px;max-height:420px;overflow:auto;
         font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace}
    .pill{display:inline-block;padding:4px 10px;border-radius:999px;background:#0f172a;border:1px solid #233}
    .good{color:#7CFC8A}
    .bad{color:#ff7a7a}
  </style>
</head>
<body>
  <h2>Anel BLE — Captura Total (Chrome / HTTPS)</h2>

  <div class="card">
    <div class="row">
      <span class="pill" id="secure">secure: ...</span>
      <span class="pill" id="ble">webbluetooth: ...</span>
      <span class="pill" id="status">status: pronto</span>
    </div>

    <div class="row">
      <button id="btnConnect">Conectar</button>
      <button id="btnDisconnect" disabled>Desconectar</button>
      <button id="btnClear">Limpar log</button>
    </div>

    <div class="row">
      <span class="pill">Dispositivo: <b id="devName">-</b></span>
      <span class="pill">Bateria: <b id="battery">--</b>%</span>
      <span class="pill">HR: <b id="hr">--</b></span>
    </div>
  </div>

  <div class="card">
    <div><b>Enviar comando (Texto ou HEX)</b></div>
    <div class="row">
      <select id="mode" disabled>
        <option value="auto">Auto (detecta HEX)</option>
        <option value="text">Texto</option>
        <option value="hex">HEX</option>
      </select>
      <input id="cmd" disabled placeholder='Ex: START | MEAS | ou HEX: AA 55 0F 01' />
      <button id="btnSend" disabled>Enviar</button>
    </div>
    <div class="row">
      <button id="btnTryStart" disabled>Tentar iniciar medição (tentativas seguras)</button>
      <span class="pill">⚠️ “Comando certo” precisa ser descoberto (protocolo do fabricante).</span>
    </div>
  </div>

  <div class="card">
    <div><b>Log (tudo que chega via Notify + tudo que for Read)</b></div>
    <div id="log"></div>
  </div>

<script>
(() => {
  const $ = (id)=>document.getElementById(id);

  const NUS_SERVICE = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
  const NUS_RX      = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";
  const NUS_TX      = "6e400003-b5a3-f393-e0a9-e50e24dcca9e";

  let device=null, server=null;

  // Preferência: escrever no NUS RX. Se não tiver, pega o 1º write que achar.
  let writeChar=null;

  function setStatus(t){ $("status").textContent = "status: " + t; }
  function log(msg){
    const t = new Date().toLocaleTimeString();
    $("log").textContent += `[${t}] ${msg}\n`;
    $("log").scrollTop = $("log").scrollHeight;
    console.log(msg);
  }
  function bytesToHex(u8){ return [...u8].map(b=>b.toString(16).padStart(2,"0")).join(" "); }

  function envBadges(){
    $("secure").textContent = "secure: " + (window.isSecureContext ? "SIM" : "NÃO");
    $("ble").textContent = "webbluetooth: " + (navigator.bluetooth ? "SIM" : "NÃO");
  }

  window.addEventListener("error", (e)=>log("ERRO JS: " + (e.message||e.type)));
  window.addEventListener("unhandledrejection", (e)=>log("PROMISE REJECTED: " + (e.reason?.message||e.reason||"erro")));

  function looksHexAuto(s){
    const t = s.trim();
    if(!t) return false;
    if(t.toLowerCase().includes("0x")) return true;
    // se tiver só hex e separadores, provável HEX
    const clean = t.replace(/0x/gi,"").replace(/[^0-9a-fA-F]/g,"");
    return clean.length >= 2 && clean.length % 2 === 0 && /^[0-9a-fA-F\s,:-]+$/.test(t);
  }

  function parseHex(s){
    const clean = s.replace(/0x/gi,"").replace(/[^0-9a-fA-F]/g,"");
    if(clean.length === 0) throw new Error("HEX vazio");
    if(clean.length % 2 !== 0) throw new Error("HEX inválido (ímpar)");
    const out = new Uint8Array(clean.length/2);
    for(let i=0;i<clean.length;i+=2) out[i/2]=parseInt(clean.slice(i,i+2),16);
    return out;
  }

  async function readBatteryIfAny(){
    try{
      const svc = await server.getPrimaryService("battery_service");
      const chr = await svc.getCharacteristic("battery_level");
      const v = await chr.readValue();
      $("battery").textContent = v.getUint8(0);
      log("🔋 Bateria: " + v.getUint8(0) + "%");
    }catch(e){
      log("🔋 Bateria: indisponível (" + e.message + ")");
    }
  }

  async function enableHeartRateIfAny(){
    try{
      const svc = await server.getPrimaryService("heart_rate");
      const chr = await svc.getCharacteristic("heart_rate_measurement"); // 2A37
      await chr.startNotifications();
      chr.addEventListener("characteristicvaluechanged", (ev)=>{
        const u8 = new Uint8Array(ev.target.value.buffer);
        const flags = u8[0];
        const is16 = (flags & 0x01) !== 0;
        const hr = is16 ? (u8[1] | (u8[2] << 8)) : u8[1];

        // “contato detectado” é parte das flags (nem todo device usa direito)
        const contactBits = (flags >> 1) & 0x03; // 0..3
        const contactText = (contactBits === 3) ? "contato:SIM" : (contactBits === 2 ? "contato:NÃO" : "contato:?");

        $("hr").textContent = `${hr} bpm (${contactText})`;
        log(`❤️ HR notify: ${hr} bpm | flags=0x${flags.toString(16)} | ${contactText} | raw=${bytesToHex(u8)}`);
      });
      log("❤️ Heart Rate notify ativo (180D/2A37).");
    }catch(e){
      log("❤️ Heart Rate: indisponível (" + e.message + ")");
    }
  }

  async function subscribeAllNotifiesAndReadAllReads(){
    const services = await server.getPrimaryServices();
    log(`Serviços encontrados: ${services.length}`);

    for(const s of services){
      log(`\n[SERVICE] ${s.uuid}`);
      const chars = await s.getCharacteristics();

      for(const c of chars){
        const props = [];
        if(c.properties.read) props.push("read");
        if(c.properties.write) props.push("write");
        if(c.properties.writeWithoutResponse) props.push("writeNoRsp");
        if(c.properties.notify) props.push("notify");
        if(c.properties.indicate) props.push("indicate");
        log(`  [CHAR] ${c.uuid} | props: ${props.join(", ")||"(nenhuma)"}`);

        // pega um writeChar fallback (se ainda não tiver)
        if(!writeChar && (c.properties.write || c.properties.writeWithoutResponse)){
          writeChar = c;
        }

        // lê tudo que der read
        if(c.properties.read){
          try{
            const v = await c.readValue();
            const u8 = new Uint8Array(v.buffer);
            log(`    read: ${bytesToHex(u8)} (len=${u8.length})`);
          }catch(e){
            log(`    read: erro (${e.message})`);
          }
        }

        // assina tudo que der notify/indicate
        if(c.properties.notify || c.properties.indicate){
          try{
            await c.startNotifications();
            c.addEventListener("characteristicvaluechanged", (ev)=>{
              const u8 = new Uint8Array(ev.target.value.buffer);
              let txt="";
              try{ txt = new TextDecoder().decode(u8); }catch(_){}
              const printable = txt && /[ -~]/.test(txt);
              if(printable){
                log(`🔔 notify ${c.uuid}: "${txt.trim()}" | hex=${bytesToHex(u8)}`);
              }else{
                log(`🔔 notify ${c.uuid}: hex=${bytesToHex(u8)}`);
              }
            });
            log(`    notify: ON`);
          }catch(e){
            log(`    notify: erro (${e.message})`);
          }
        }
      }
    }
  }

  async function bindNUSPreferentialWrite(){
    // Se existir NUS, usa RX como write principal
    try{
      const nus = await server.getPrimaryService(NUS_SERVICE);
      const rx  = await nus.getCharacteristic(NUS_RX);
      const tx  = await nus.getCharacteristic(NUS_TX);

      writeChar = rx;

      await tx.startNotifications();
      tx.addEventListener("characteristicvaluechanged", (ev)=>{
        const u8 = new Uint8Array(ev.target.value.buffer);
        let txt="";
        try{ txt = new TextDecoder().decode(u8); }catch(_){}
        const printable = txt && /[ -~]/.test(txt);
        if(printable){
          log(`📨 UART TX: "${txt.trim()}" | hex=${bytesToHex(u8)}`);
        }else{
          log(`📨 UART TX: hex=${bytesToHex(u8)}`);
        }
      });

      log("✅ Nordic UART ativo (RX write / TX notify).");
    }catch(e){
      log("ℹ️ Nordic UART não disponível no Chrome (" + e.message + "). Vou usar fallback write se existir.");
    }
  }

  async function sendCommand(cmdStr, mode){
    if(!writeChar) throw new Error("Nenhuma característica de escrita disponível (writeChar).");

    const m = mode;
    const autoHex = looksHexAuto(cmdStr);

    let payload;
    if(m === "hex" || (m === "auto" && autoHex)){
      payload = parseHex(cmdStr);
      log("➡️ Enviando HEX: " + bytesToHex(payload));
    }else{
      payload = new TextEncoder().encode(cmdStr);
      log('➡️ Enviando TEXTO: "' + cmdStr + '"');
    }

    const CHUNK = 20;
    for(let i=0;i<payload.length;i+=CHUNK){
      const slice = payload.slice(i,i+CHUNK);
      if(writeChar.properties?.writeWithoutResponse){
        await writeChar.writeValueWithoutResponse(slice);
      }else{
        await writeChar.writeValue(slice);
      }
      log("✅ TX enviado: " + bytesToHex(slice));
      await new Promise(r=>setTimeout(r, 35));
    }
  }

  async function connect(){
    if(!navigator.bluetooth){
      alert("Web Bluetooth não disponível. Use Chrome/Edge no PC.");
      return;
    }
    if(!window.isSecureContext){
      alert("Precisa ser HTTPS (GitHub Pages OK) ou localhost.");
      return;
    }

    try{
      setStatus("abrindo seletor...");
      log("Abrindo seletor BLE...");

      device = await navigator.bluetooth.requestDevice({
        acceptAllDevices: true,
        optionalServices: [
          NUS_SERVICE,
          "battery_service",
          "device_information",
          "heart_rate",
          "fee7",
          "ae00",
          "be940000-7333-be46-b7ae-689e71722bd5"
        ]
      });

      $("devName").textContent = device.name || "(sem nome)";
      log("Dispositivo: " + (device.name || "(sem nome)"));

      device.addEventListener("gattserverdisconnected", ()=>{
        log("⚠️ Desconectou.");
        setStatus("desconectado");
        $("btnDisconnect").disabled = true;
        $("mode").disabled = true;
        $("cmd").disabled = true;
        $("btnSend").disabled = true;
        $("btnTryStart").disabled = true;
      });

      setStatus("conectando...");
      server = await device.gatt.connect();
      setStatus("conectado");
      log("GATT conectado.");

      $("btnDisconnect").disabled = false;
      $("mode").disabled = false;
      $("cmd").disabled = false;
      $("btnSend").disabled = false;
      $("btnTryStart").disabled = false;

      await readBatteryIfAny();
      await enableHeartRateIfAny();

      // Preferir UART se existir
      await bindNUSPreferentialWrite();

      // Captura geral (notify/read) para descobrir medidas
      await subscribeAllNotifiesAndReadAllReads();

      log("\n✅ Pronto. Agora coloque o anel no dedo e observe os pacotes no log.");
      log("Dica: se HR mostrar 'contato:NÃO', o valor pode ser lixo/placeholder.");
    }catch(e){
      log("ERRO connect: " + e.name + ": " + e.message);
      setStatus("erro");
    }
  }

  function disconnect(){
    try{
      if(device?.gatt?.connected) device.gatt.disconnect();
      setStatus("desconectado");
      log("Desconectado manualmente.");
    }catch(e){
      log("ERRO disconnect: " + e.message);
    }
  }

  // Tentativas “seguras” (texto) — não garantem, mas ajudam a descobrir resposta do firmware
  async function tryStart(){
    const tries = [
      "START",
      "MEAS",
      "MEASURE",
      "MEAS_START",
      "START_MEAS",
      "HR_START",
      "SPO2_START"
    ];
    for(const t of tries){
      try{
        await sendCommand(t, "text");
        await new Promise(r=>setTimeout(r, 200));
      }catch(e){
        log("Falha ao enviar '" + t + "': " + e.message);
      }
    }
    log("Tentativas de texto enviadas. Se o anel usa comando BINÁRIO, precisamos descobrir o HEX correto pelo protocolo.");
  }

  $("btnConnect").addEventListener("click", ()=>{ $("log").textContent=""; connect(); });
  $("btnDisconnect").addEventListener("click", disconnect);
  $("btnClear").addEventListener("click", ()=>{ $("log").textContent=""; log("Log limpo."); });

  $("btnSend").addEventListener("click", async ()=>{
    const cmd = $("cmd").value.trim();
    if(!cmd){ log("Digite um comando."); return; }
    try{
      await sendCommand(cmd, $("mode").value);
    }catch(e){
      log("ERRO envio: " + e.message);
    }
  });

  $("btnTryStart").addEventListener("click", tryStart);

  envBadges();
})();
</script>
</body>
</html>
