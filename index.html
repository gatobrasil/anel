<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monitor do Anel BLE</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      margin: 0;
      padding: 20px;
      color: #1f2937;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    h1 {
      margin-bottom: 10px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin-top: 16px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }

    button {
      padding: 12px 16px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-right: 8px;
    }

    #connectBtn {
      background: #2563eb;
      color: white;
    }

    #disconnectBtn {
      background: #e5e7eb;
      color: #111827;
    }

    .big {
      font-size: 48px;
      font-weight: bold;
      margin-top: 10px;
    }

    .label {
      font-weight: bold;
    }

    pre {
      background: #111827;
      color: #10b981;
      padding: 14px;
      border-radius: 12px;
      white-space: pre-wrap;
      overflow-x: auto;
      min-height: 120px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Monitor do Anel BLE</h1>
    <p>Leitura de frequência cardíaca em tempo real.</p>

    <div class="card">
      <button id="connectBtn">Conectar anel</button>
      <button id="disconnectBtn">Desconectar</button>
      <p><span class="label">Status:</span> <span id="status">Desconectado</span></p>
      <p><span class="label">Dispositivo:</span> <span id="deviceName">---</span></p>
      <p><span class="label">Local do sensor:</span> <span id="sensorLocation">---</span></p>
    </div>

    <div class="card">
      <div class="label">Frequência cardíaca</div>
      <div class="big"><span id="heartRate">--</span> bpm</div>
    </div>

    <div class="card">
      <div class="label">Log</div>
      <pre id="log"></pre>
    </div>
  </div>

  <script>
    let device = null;
    let server = null;
    let hrChar = null;

    const statusEl = document.getElementById("status");
    const deviceNameEl = document.getElementById("deviceName");
    const sensorLocationEl = document.getElementById("sensorLocation");
    const heartRateEl = document.getElementById("heartRate");
    const logEl = document.getElementById("log");

    function log(msg) {
      logEl.textContent += msg + "\n";
      logEl.scrollTop = logEl.scrollHeight;
      console.log(msg);
    }

    function setStatus(msg) {
      statusEl.textContent = msg;
    }

    function decodeSensorLocation(value) {
      const code = value.getUint8(0);
      const map = {
        0: "Outro",
        1: "Peito",
        2: "Pulso",
        3: "Dedo",
        4: "Mão",
        5: "Lóbulo da orelha",
        6: "Pé"
      };
      return map[code] || `Desconhecido (${code})`;
    }

    function parseHeartRate(dataView) {
      const flags = dataView.getUint8(0);
      const is16Bit = flags & 0x01;

      if (is16Bit) {
        return dataView.getUint16(1, true);
      } else {
        return dataView.getUint8(1);
      }
    }

    function handleHeartRateChanged(event) {
      const value = event.target.value;
      const hr = parseHeartRate(value);
      heartRateEl.textContent = hr;
      log(`[${new Date().toLocaleTimeString()}] FC: ${hr} bpm`);
    }

    async function connectRing() {
      try {
        logEl.textContent = "";
        setStatus("Solicitando dispositivo...");

        device = await navigator.bluetooth.requestDevice({
          filters: [{ services: ['heart_rate'] }],
          optionalServices: ['heart_rate']
        });

        deviceNameEl.textContent = device.name || "Sem nome";
        device.addEventListener("gattserverdisconnected", onDisconnected);

        setStatus("Conectando...");
        server = await device.gatt.connect();

        const hrService = await server.getPrimaryService('heart_rate');

        hrChar = await hrService.getCharacteristic('heart_rate_measurement');
        const locationChar = await hrService.getCharacteristic('body_sensor_location');

        const locationValue = await locationChar.readValue();
        const sensorLocation = decodeSensorLocation(locationValue);
        sensorLocationEl.textContent = sensorLocation;

        await hrChar.startNotifications();
        hrChar.addEventListener("characteristicvaluechanged", handleHeartRateChanged);

        setStatus("Conectado");
        log("Conectado com sucesso.");
        log("Notificações de frequência cardíaca ativadas.");
        log("Local do sensor: " + sensorLocation);
      } catch (error) {
        setStatus("Erro");
        log("Erro: " + error.message);
        console.error(error);
      }
    }

    function disconnectRing() {
      try {
        if (hrChar) {
          hrChar.removeEventListener("characteristicvaluechanged", handleHeartRateChanged);
        }

        if (device && device.gatt && device.gatt.connected) {
          device.gatt.disconnect();
        }

        setStatus("Desconectado");
        log("Desconectado manualmente.");
      } catch (error) {
        log("Erro ao desconectar: " + error.message);
      }
    }

    function onDisconnected() {
      setStatus("Desconectado");
      log("Dispositivo desconectado.");
    }

    document.getElementById("connectBtn").addEventListener("click", connectRing);
    document.getElementById("disconnectBtn").addEventListener("click", disconnectRing);
  </script>
</body>
</html>
